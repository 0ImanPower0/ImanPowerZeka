<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartalHaber AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <div id="chat-screen" class="flex-1 flex flex-col max-w-5xl w-full mx-auto p-4 h-[100vh]">
        <header class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700 mb-4 shadow-md">
            <div class="flex items-center space-x-3">
                <img src="logo.png" alt="Logo" class="h-10 w-10 object-contain" onerror="this.src='https://placehold.co/50x50?text=AI'">
                <span class="font-bold text-lg tracking-wide text-white">KartalHaber AI</span>
            </div>
            <span class="text-sm text-green-400 flex items-center gap-1.5 font-medium">
                <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span> Tünel Bağlantısı Aktif
            </span>
        </header>

        <div id="chat-container" class="chat-container flex-1 overflow-y-auto space-y-4 pr-2 mb-4 bg-gray-800/40 p-4 rounded-xl border border-gray-700/50">
            <div class="flex items-start gap-3">
                <div class="bg-blue-600 p-2.5 rounded-xl shadow-md"><i class="fa-solid fa-robot text-white"></i></div>
                <div class="bg-gray-800 px-4 py-3 rounded-2xl rounded-tl-none max-w-[80%] border border-gray-700 shadow-sm">
                    Merhaba! Ben Gemini. Tarayıcı engellerini tamamen aşmak için güvenli bir tünel bağlantısı kurduk. Bana dilediğin soruyu sorabilirsin, anında yanıtlayacağım!
                </div>
            </div>
        </div>

        <div class="flex gap-2 bg-gray-800 p-2 rounded-xl border border-gray-700 shadow-lg">
            <input type="text" id="user-input" onkeypress="if(event.key === 'Enter') sendMessage()" placeholder="Bir şeyler yazın..." class="flex-1 bg-transparent px-4 py-3 text-white focus:outline-none">
            <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg w-12 h-12 flex items-center justify-center transition shadow-md">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // Görsellerinden aldığım çalışan orijinal anahtarın tamamı
        const GEMINI_API_KEY = "AQ.Ab8RN6ICVlrUbJpHNB8ZMnj99qRf32q2NFBBjeyyAB5zoyHdNA"; 
        
        // Tarayıcı engelini aşan AllOrigins Proxy Tünel URL'i
        const targetUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        const PROXY_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

        window.sendMessage = async function() {
            const inputField = document.getElementById('user-input');
            const userMessage = inputField.value.trim();
            if (!userMessage) return;

            inputField.value = "";
            const chatContainer = document.getElementById('chat-container');

            // Kullanıcı mesajını ekle
            chatContainer.innerHTML += `
                <div class="flex items-start gap-3 justify-end">
                    <div class="bg-blue-600/20 px-4 py-3 rounded-2xl rounded-tr-none max-w-[80%] border border-blue-500/30 text-white">
                        ${userMessage}
                    </div>
                    <div class="bg-gray-700 p-2.5 rounded-xl shadow-md"><i class="fa-solid fa-user text-white"></i></div>
                </div>
            `;
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Yükleniyor animasyonu ekle
            const loadingId = "load-" + Date.now();
            chatContainer.innerHTML += `
                <div id="${loadingId}" class="flex items-start gap-3 animate-pulse">
                    <div class="bg-blue-600 p-2.5 rounded-xl"><i class="fa-solid fa-robot text-white"></i></div>
                    <div class="bg-gray-800 px-4 py-3 rounded-2xl rounded-tl-none max-w-[80%] border border-gray-700 text-gray-400">
                        Düşünüyor...
                    </div>
                </div>
            `;
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // İsteyi tünel üzerinden gönderiyoruz
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userMessage }] }] })
                });

                const outerData = await response.json();
                document.getElementById(loadingId).remove();

                // Tünelden gelen ham veriyi ayıkla
                const innerData = JSON.parse(outerData.contents);

                let aiResponse = "Yapay zekadan yanıt çözülemedi.";
                if (innerData.candidates && innerData.candidates[0].content.parts[0].text) {
                    aiResponse = innerData.candidates[0].content.parts[0].text;
                }

                // Yanıtı ekrana bas
                chatContainer.innerHTML += `
                    <div class="flex items-start gap-3">
                        <div class="bg-blue-600 p-2.5 rounded-xl shadow-md"><i class="fa-solid fa-robot text-white"></i></div>
                        <div class="bg-gray-800 px-4 py-3 rounded-2xl rounded-tl-none max-w-[80%] border border-gray-700 text-white whitespace-pre-line">
                            ${aiResponse}
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                chatContainer.innerHTML += `
                    <div class="flex items-start gap-3">
                        <div class="bg-red-600 p-2.5 rounded-xl"><i class="fa-solid fa-triangle-exclamation text-white"></i></div>
                        <div class="bg-gray-800 px-4 py-3 rounded-2xl rounded-tl-none max-w-[80%] border border-red-500/30 text-red-400">
                            Bağlantı tünelinde gecikme oldu. Lütfen tekrar mesaj göndermeyi deneyin.
                        </div>
                    </div>
                `;
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
