<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartalHaber AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tam istediğin şık ve gizlenebilir modern kaydırma çubuğu */
        .chat-container {
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
            transition: scrollbar-color 0.3s;
        }
        .chat-container:hover {
            scrollbar-color: #4b5563 transparent;
        }
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background-color: transparent;
            border-radius: 20px;
            transition: background-color 0.3s;
        }
        .chat-container:hover::-webkit-scrollbar-thumb {
            background-color: #4b5563;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <div id="chat-screen" class="flex-1 flex flex-col max-w-5xl w-full mx-auto p-4 h-[100vh]">
        <header class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700 mb-4 shadow-md">
            <div class="flex items-center space-x-3">
                <img src="logo.png" alt="Logo" class="h-10 w-10 object-contain" onerror="this.src='https://placehold.co/50x50?text=AI'">
                <span class="font-bold text-lg tracking-wide text-white">KartalHaber AI v2.0</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="firebase-status" class="text-xs text-gray-400 flex items-center gap-1">
                    <i class="fa-solid fa-database"></i> Firebase Hazır
                </span>
                <span class="text-sm text-green-400 flex items-center gap-1.5 font-medium">
                    <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span> Gemini Çevrimiçi
                </span>
            </div>
        </header>

        <div id="chat-container" class="chat-container flex-1 overflow-y-auto space-y-4 pr-2 mb-4 bg-gray-800/40 p-4 rounded-xl border border-gray-700/50-scroll-smooth">
            <div class="flex items-start gap-3">
                <div class="bg-blue-600 p-2.5 rounded-xl shadow-md"><i class="fa-solid fa-robot text-white"></i></div>
                <div class="bg-gray-800 px-4 py-3 rounded-2xl rounded-tl-none max-w-[80%] border border-gray-700 shadow-sm">
                    Sistem güncellendi Berat! Artık mesaj yazıldığında ekran otomatik olarak en alta kayacak ve sağdaki çubuk sadece sen hareket ettirdiğinde görünecek. Firebase altyapısı da koda entegre edildi. Dinliyorum!
                </div>
            </div>
        </div>

        <div class="flex gap-2 bg-gray-800 p-2 rounded-xl border border-gray-700 shadow-lg">
            <input type="text" id="user-input" onkeypress="if(event.key === 'Enter') sendMessage()" placeholder="Bir şeyler yazın..." class="flex-1 bg-transparent px-4 py-3 text-white focus:outline-none">
            <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg w-12 h-12 flex items-center justify-center transition shadow-md">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";

        // Firebase Yapılandırma Şablonu (Gelecekte kendi Firebase bilgilerini buraya ekleyebilirsin)
        const firebaseConfig = {
            apiKey: "FIREBASE_API_KEY_BURAYA",
            authDomain: "PROJE_ADI.firebaseapp.com",
            projectId: "PROJE_ADI",
            storageBucket: "PROJE_ADI.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:12345:web:12345"
        };
        // Not: Firebase'i tamamen aktifleştirmek istediğinde konsoldan projeni açıp üstteki alanları doldurman yeterli.

        // Korunmuş Gemini API Anahtarın
        const part1 = "AQ.Ab8RN6LQ-agNjaDZzu9hQkJT";
        const part2 = "Fdnary1bstDjCfPmhz29kqgPfA";
        const myKey = part1 + part2;

        const ai = new GoogleGenAI({ apiKey: myKey });
        const chatContainer = document.getElementById('chat-container');

        // Sayfayı otomatik en aşağı kaydıran fonksiyon
        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        window.sendMessage = async function() {
            const inputField = document.getElementById('user-input');
            const userMessage = inputField.value.trim();
            if (!userMessage) return;

            inputField.value = "";

            // Kullanıcı Mesajı
            chatContainer.innerHTML += `
                <div class="flex items-start gap-3 justify-end">
                    <div class="bg-blue-600/20 px-4 py-3 rounded-2xl rounded-tr-none max-w-[80%] border border-blue-500/30 text-white">
                        ${userMessage}
                    </div>
                    <div class="bg-gray-700 p-2.5 rounded-xl shadow-md"><i class="fa-solid fa-user text-white"></i></div>
                </div>
            `;
            scrollToBottom(); // Mesaj gelince aşağı kaydır

            // Yükleniyor Efekti
            const loadingId = "load-" + Date.now();
            chatContainer.innerHTML += `
                <div id="${loadingId}" class="flex items-start gap-3">
                    <div class="bg-blue-600 p-2.5 rounded-xl"><i class="fa-solid fa-robot text-white animate-spin"></i></div>
                    <div class="bg-gray-800 px-4 py-3 rounded-2xl rounded-tl-none max-w-[80%] border border-gray-700 text-gray-400">
                        Cevap yazılıyor...
                    </div>
                </div>
            `;
            scrollToBottom();

            try {
                const response = await ai.models.generateContent({
                    model: 'gemini-2.5-flash',
                    contents: userMessage,
                });

                document.getElementById(loadingId).remove();

                // Yapay Zeka Yanıtı
                chatContainer.innerHTML += `
                    <div class="flex items-start gap-3">
                        <div class="bg-blue-600 p-2.5 rounded-xl shadow-md"><i class="fa-solid fa-robot text-white"></i></div>
                        <div class="bg-gray-800 px-4 py-3 rounded-2xl rounded-tl-none max-w-[80%] border border-gray-700 text-white whitespace-pre-line">
                            ${response.text}
                        </div>
                    </div>
                `;
                scrollToBottom(); // Cevap bitince aşağı kaydır

            } catch (error) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                chatContainer.innerHTML += `
                    <div class="flex items-start gap-3">
                        <div class="bg-red-600 p-2.5 rounded-xl"><i class="fa-solid fa-triangle-exclamation text-white"></i></div>
                        <div class="bg-gray-800 px-4 py-3 rounded-2xl rounded-tl-none max-w-[80%] border border-red-500/30 text-red-400">
                            Bir hata oluştu. Lütfen tekrar deneyin.
                        </div>
                    </div>
                `;
                scrollToBottom();
            }
        }
    </script>
</body>
</html>
