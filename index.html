<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartalHaber AI | Modern Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Markdown Desteği İçin -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .chat-container { scrollbar-width: thin; scrollbar-color: #475569 transparent; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 20px; }
        /* Markdown Stilleri */
        .ai-message pre { background: #1e293b; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        .ai-message code { font-family: monospace; color: #38bdf8; }
        .ai-message p { margin-bottom: 0.5rem; }
        .ai-message ul { list-style: disc; padding-left: 1.5rem; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col p-5">
        <h1 class="text-xl font-bold text-white mb-8 tracking-tight"><i class="fa-solid fa-robot mr-2 text-blue-500"></i>KartalHaber AI</h1>
        <button id="btn-new-chat" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl mb-6 shadow-lg shadow-blue-900/20 transition-all">
            <i class="fa-solid fa-plus mr-2"></i> Yeni Sohbet
        </button>
        <div id="chat-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
    </aside>

    <!-- CHAT PANELİ -->
    <main class="flex-1 flex flex-col h-full bg-slate-950">
        <div id="chat-container" class="chat-container flex-1 overflow-y-auto p-6 space-y-6">
            <!-- Mesajlar buraya gelecek -->
        </div>
        <div class="p-4 bg-slate-900/50 border-t border-slate-800">
            <div class="max-w-4xl mx-auto flex gap-3 bg-slate-900 p-2 rounded-2xl border border-slate-700 focus-within:border-blue-500 transition-all">
                <input type="text" id="user-input" placeholder="Bir şeyler sorun..." class="flex-1 bg-transparent px-4 py-2 text-white focus:outline-none placeholder-slate-500">
                <button id="btn-send" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl transition-all">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDEbenlp7KcVZ2oE90iEHTTl2oEuGFVGKs",
            authDomain: "kartalhaber-49ae6.firebaseapp.com",
            databaseURL: "https://kartalhaber-49ae6-default-rtdb.firebaseio.com",
            projectId: "kartalhaber-49ae6"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);
        const GROQ_API_KEY = "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";

        let currentUser = null;
        let activeChatId = "sohbet_1";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadChatList();
                switchChat("sohbet_1");
            }
        });

        window.switchChat = (chatId) => {
            activeChatId = chatId;
            onValue(ref(database, `users/${currentUser.uid}/chats/${chatId}/messages`), (snapshot) => {
                const container = document.getElementById('chat-container');
                container.innerHTML = "";
                const data = snapshot.val();
                if(data) Object.values(data).forEach(msg => {
                    const isUser = msg.sender === 'user';
                    container.innerHTML += `
                        <div class="flex ${isUser ? 'justify-end' : 'justify-start'}">
                            <div class="${isUser ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-200 ai-message'} p-4 rounded-2xl max-w-[80%] shadow-lg">
                                ${isUser ? msg.text : marked.parse(msg.text)}
                            </div>
                        </div>`;
                });
                container.scrollTop = container.scrollHeight;
            });
        };

        function loadChatList() {
            onValue(ref(database, `users/${currentUser.uid}/chats`), (snapshot) => {
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                const data = snapshot.val();
                if(data) Object.keys(data).forEach(id => {
                    list.innerHTML += `<button onclick="switchChat('${id}')" class="w-full text-left p-3 hover:bg-slate-800 rounded-lg text-sm text-slate-400 hover:text-white transition-colors truncate">Sohbet: ${id.split('_')[1]}</button>`;
                });
            });
        }

        document.getElementById('btn-send').onclick = async () => {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;
            input.value = "";
            push(ref(database, `users/${currentUser.uid}/chats/${activeChatId}/messages`), { sender: "user", text: text });

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: text }]
                    })
                });
                const result = await response.json();
                push(ref(database, `users/${currentUser.uid}/chats/${activeChatId}/messages`), { sender: "ai", text: result.choices[0].message.content });
            } catch(e) {
                push(ref(database, `users/${currentUser.uid}/chats/${activeChatId}/messages`), { sender: "ai", text: "**Hata:** Sistem şu an yanıt veremiyor." });
            }
        };

        document.getElementById('btn-new-chat').onclick = () => switchChat("sohbet_" + Date.now());
    </script>
</body>
</html>
