<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartalHaber AI Chat - Tam Özellikli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container { scrollbar-width: thin; scrollbar-color: #4b5563 transparent; transition: scrollbar-color 0.3s; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 20px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex">

    <!-- GİRİŞ PANELİ -->
    <div id="auth-screen" class="fixed inset-0 bg-gray-950/95 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl max-w-md w-full shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-6 text-center" id="auth-title">KartalHaber AI Portal</h2>
            <input type="email" id="auth-email" placeholder="E-posta" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 mb-4 text-white">
            <input type="password" id="auth-password" placeholder="Şifre" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 mb-4 text-white">
            <button id="btn-primary" onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition">Giriş Yap</button>
            <div id="auth-error" class="text-red-400 text-sm text-center mt-4 hidden"></div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside id="main-sidebar" class="w-64 bg-gray-900 border-r border-gray-800 p-4 hidden">
        <button id="btn-new-chat" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl mb-6">Yeni Sohbet</button>
        <div id="chat-list" class="space-y-2"></div>
    </aside>

    <!-- ANA CHAT -->
    <main id="main-chat" class="flex-1 flex flex-col h-[100vh] p-4 hidden">
        <div id="chat-container" class="chat-container flex-1 overflow-y-auto space-y-4 pr-2 mb-4 bg-gray-800/40 p-4 rounded-xl border border-gray-700/50"></div>
        <div class="flex gap-2 bg-gray-800 p-2 rounded-xl border border-gray-700">
            <input type="text" id="user-input" placeholder="Bir şeyler yazın..." class="flex-1 bg-transparent px-4 py-3 text-white focus:outline-none">
            <button id="btn-send" class="bg-blue-600 text-white p-3 rounded-lg w-12 h-12"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDEbenlp7KcVZ2oE90iEHTTl2oEuGFVGKs",
            authDomain: "kartalhaber-49ae6.firebaseapp.com",
            databaseURL: "https://kartalhaber-49ae6-default-rtdb.firebaseio.com",
            projectId: "kartalhaber-49ae6",
            storageBucket: "kartalhaber-49ae6.firebasestorage.app",
            messagingSenderId: "804745909398",
            appId: "1:804745909398:web:d4ecaf7174886bbe835eb7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        // SENİN ANAHTARIN VE DÜZELTİLMİŞ MODEL
        const GEMINI_API_KEY = "AQ.Ab8RN6LQ-agNjaDZzu9hQkJTFdnary1bstDjCfPmhz29kqgPfA";

        let currentUser = null;
        let activeChatId = "sohbet_1";
        const chatContainer = document.getElementById('chat-container');

        window.handleAuth = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value); }
            catch(e) { document.getElementById('auth-error').innerText = "Hata oluştu."; document.getElementById('auth-error').classList.remove('hidden'); }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-sidebar').classList.remove('hidden');
                document.getElementById('main-chat').classList.remove('hidden');
                switchChat("sohbet_1");
            }
        });

        window.switchChat = (chatId) => {
            activeChatId = chatId;
            onValue(ref(database, `users/${currentUser.uid}/chats/${chatId}/messages`), (snapshot) => {
                chatContainer.innerHTML = "";
                const data = snapshot.val();
                if(data) Object.values(data).forEach(msg => {
                    chatContainer.innerHTML += `<div class="p-3 rounded-lg ${msg.sender === 'user' ? 'bg-blue-600 ml-auto' : 'bg-gray-700'} max-w-[80%]">${msg.text}</div>`;
                });
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;
            input.value = "";
            push(ref(database, `users/${currentUser.uid}/chats/${activeChatId}/messages`), { sender: "user", text: text });

            try {
                // BURASI ÇOK ÖNEMLİ: gemini-1.5-flash yerine gemini-1.0-pro kullandık
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.0-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const result = await response.json();
                if(result.candidates) {
                    const aiText = result.candidates[0].content.parts[0].text;
                    push(ref(database, `users/${currentUser.uid}/chats/${activeChatId}/messages`), { sender: "ai", text: aiText });
                } else {
                    throw new Error("Model yanıt vermedi.");
                }
            } catch(e) {
                push(ref(database, `users/${currentUser.uid}/chats/${activeChatId}/messages`), { sender: "ai", text: "Hata: " + e.message });
            }
        }

        document.getElementById('btn-send').addEventListener('click', sendMessage);
        document.getElementById('btn-new-chat').addEventListener('click', () => {
            const newId = "sohbet_" + Date.now();
            switchChat(newId);
        });
    </script>
</body>
</html>
