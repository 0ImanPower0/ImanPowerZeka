<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartalHaber AI Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container { scrollbar-width: thin; scrollbar-color: #374151 transparent; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #374151; border-radius: 20px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 flex h-screen">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col p-4">
        <button id="btn-new-chat" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl mb-6">Yeni Sohbet</button>
        <div id="chat-list" class="flex-1 overflow-y-auto space-y-2"></div>
    </aside>

    <!-- CHAT PANELİ -->
    <main class="flex-1 flex flex-col p-4">
        <div id="chat-container" class="chat-container flex-1 overflow-y-auto space-y-4 mb-4 bg-gray-900/50 p-4 rounded-xl border border-gray-800"></div>
        <div class="flex gap-2 bg-gray-900 p-2 rounded-xl border border-gray-800">
            <input type="text" id="user-input" placeholder="Bir şeyler yazın..." class="flex-1 bg-transparent px-4 py-3 text-white focus:outline-none">
            <button id="btn-send" class="bg-blue-600 text-white p-3 rounded-lg w-12"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDEbenlp7KcVZ2oE90iEHTTl2oEuGFVGKs",
            authDomain: "kartalhaber-49ae6.firebaseapp.com",
            databaseURL: "https://kartalhaber-49ae6-default-rtdb.firebaseio.com",
            projectId: "kartalhaber-49ae6"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        const GROQ_API_KEY = "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";

        let currentUser = null;
        let activeChatId = "sohbet_1";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadChatList();
                switchChat("sohbet_1");
            }
        });

        window.switchChat = (chatId) => {
            activeChatId = chatId;
            onValue(ref(database, `users/${currentUser.uid}/chats/${chatId}/messages`), (snapshot) => {
                const chatContainer = document.getElementById('chat-container');
                chatContainer.innerHTML = "";
                const data = snapshot.val();
                if(data) Object.values(data).forEach(msg => {
                    chatContainer.innerHTML += `<div class="p-3 rounded-lg ${msg.sender === 'user' ? 'bg-blue-600 ml-auto' : 'bg-gray-800'} max-w-[80%]">${msg.text}</div>`;
                });
            });
        };

        function loadChatList() {
            onValue(ref(database, `users/${currentUser.uid}/chats`), (snapshot) => {
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                const data = snapshot.val();
                if(data) Object.keys(data).forEach(id => {
                    list.innerHTML += `<button onclick="switchChat('${id}')" class="w-full text-left p-3 bg-gray-800 rounded-lg text-sm truncate">${id.replace('sohbet_', 'Sohbet ')}</button>`;
                });
            });
        }

        document.getElementById('btn-send').onclick = async () => {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;
            input.value = "";
            push(ref(database, `users/${currentUser.uid}/chats/${activeChatId}/messages`), { sender: "user", text: text });

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}` 
                    },
                    body: JSON.stringify({
                        // BURAYI GÜNCELLEDİK: Eski model yerine yeni model!
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: text }]
                    })
                });

                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error?.message || "Bilinmeyen API Hatası");
                }

                const aiText = result.choices[0].message.content;
                push(ref(database, `users/${currentUser.uid}/chats/${activeChatId}/messages`), { sender: "ai", text: aiText });

            } catch(e) {
                push(ref(database, `users/${currentUser.uid}/chats/${activeChatId}/messages`), { sender: "ai", text: "HATA: " + e.message });
            }
        };

        document.getElementById('btn-new-chat').onclick = () => switchChat("sohbet_" + Date.now());
    </script>
</body>
</html>
